<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Dad!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Comic Sans MS', 'Marker Felt', sans-serif;
    background: linear-gradient(135deg, #ffd6e8 0%, #fff0f5 40%, #d9f0ff 100%);
  }

  /* Confetti dots in the background */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(-50px) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(720deg); }
  }

  /* Main title */
  .title-wrap {
    position: absolute;
    top: 14%;
    width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  h1 {
    margin: 0;
    font-size: clamp(2.5rem, 7vw, 6rem);
    color: #ff5fa2;
    text-shadow:
      3px 3px 0 #fff,
      6px 6px 0 #ffb3d1,
      9px 9px 12px rgba(0,0,0,0.15);
    animation: bounce 1.6s ease-in-out infinite;
  }
  h2 {
    margin: 10px 0 0;
    font-size: clamp(1.2rem, 3vw, 2.2rem);
    color: #6a4fb6;
    text-shadow: 2px 2px 0 #fff;
    animation: wiggle 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-18px) rotate(2deg); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  /* Floating hearts and stars */
  .floaty {
    position: absolute;
    font-size: 2rem;
    animation: floatUp linear infinite;
    pointer-events: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.8); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
  }

  /* Character running track */
  .character {
    position: absolute;
    width: 130px;
    height: 130px;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  .character svg {
    width: 100%;
    height: 100%;
    animation: hop 0.5s ease-in-out infinite;
  }
  @keyframes hop {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-12px) rotate(3deg); }
  }

  /* Each character runs across at a different speed and Y */
  .c1 { top: 60%; animation: runRight 12s linear infinite; }
  .c2 { top: 72%; animation: runLeft  15s linear infinite; }
  .c3 { top: 45%; animation: runRight 18s linear infinite; animation-delay: -4s; }
  .c4 { top: 80%; animation: runLeft  10s linear infinite; animation-delay: -2s; }
  .c5 { top: 55%; animation: runRight 20s linear infinite; animation-delay: -8s; }
  .c6 { top: 35%; animation: runLeft  14s linear infinite; animation-delay: -6s; }
  .c7 { top: 85%; animation: runRight 16s linear infinite; animation-delay: -3s; }

  @keyframes runRight {
    0%   { left: -160px;  transform: scaleX(1); }
    100% { left: 100vw;   transform: scaleX(1); }
  }
  @keyframes runLeft {
    0%   { left: 100vw;   transform: scaleX(-1); }
    100% { left: -160px;  transform: scaleX(-1); }
  }

  /* Cake in the middle bottom */
  .cake {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    z-index: 5;
    animation: cakeBounce 2s ease-in-out infinite;
  }
  @keyframes cakeBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-10px); }
  }
  .flame {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: flicker 0.45s ease-in-out infinite alternate;
  }
  @keyframes flicker {
    0%   { transform: scale(0.92, 0.95) translateY(0); }
    50%  { transform: scale(1.05, 1.0)  translateY(-1px); }
    100% { transform: scale(0.98, 1.08) translateY(-2px); }
  }
  .glow {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: glowPulse 1.2s ease-in-out infinite alternate;
  }
  @keyframes glowPulse {
    0%   { opacity: 0.35; transform: scale(1); }
    100% { opacity: 0.6;  transform: scale(1.15); }
  }

  /* ---------- Montage screen ---------- */
  .montage-screen {
    position: fixed;
    inset: 0;
    background: #0a0014;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.6s ease;
    z-index: 100;
    overflow: hidden;
  }
  .montage-screen.active {
    opacity: 1;
    pointer-events: auto;
  }
  .slide {
    position: absolute;
    inset: 0;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    background-color: #0a0014;
    opacity: 0;
    transition: opacity 1.6s ease-in-out;
    will-change: opacity, transform;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  .slide.active {
    opacity: 1;
  }
  .slide.active.kb1 { animation: kb1 6s ease-out forwards; }
  .slide.active.kb2 { animation: kb2 6s ease-out forwards; }
  .slide.active.kb3 { animation: kb3 6s ease-out forwards; }
  .slide.active.kb4 { animation: kb4 6s ease-out forwards; }
  @keyframes kb1 {
    0%   { transform: scale(1.0)  translate(0, 0); }
    100% { transform: scale(1.10) translate(-2%, -2%); }
  }
  @keyframes kb2 {
    0%   { transform: scale(1.0)  translate(2%, -2%); }
    100% { transform: scale(1.10) translate(-1%, 1%); }
  }
  @keyframes kb3 {
    0%   { transform: scale(1.0)  translate(2%, -1%); }
    100% { transform: scale(1.10) translate(-1%, 2%); }
  }
  @keyframes kb4 {
    0%   { transform: scale(1.0)  translate(-2%, 2%); }
    100% { transform: scale(1.10) translate(1%, -1%); }
  }

  /* On mobile/touch devices, disable Ken Burns to avoid jitter — crossfade only */
  @media (max-width: 768px), (hover: none) and (pointer: coarse) {
    .slide.active.kb1,
    .slide.active.kb2,
    .slide.active.kb3,
    .slide.active.kb4 {
      animation: none;
      transform: translateZ(0);
    }
  }
  .montage-caption {
    position: absolute;
    bottom: 6%;
    width: 100%;
    text-align: center;
    color: #ffd6e8;
    font-size: clamp(1.5rem, 4vw, 3rem);
    text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 30px rgba(255,95,162,0.5);
    z-index: 110;
    opacity: 0;
    transition: opacity 1.5s ease;
    pointer-events: none;
  }
  .montage-caption.show { opacity: 1; }

  .audio-prompt {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 16px 32px;
    border-radius: 30px;
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 120;
    display: none;
    border: 2px solid #ff8ec1;
  }
  .audio-prompt.show { display: block; }

  /* Click message */
  .hint {
    position: absolute;
    bottom: 2%;
    width: 100%;
    text-align: center;
    color: #b06aa8;
    font-size: 1rem;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="title-wrap">
  <h1>Happy Birthday Dad! </h1>
  <h2>~ lots of love - your favorite oldest son ~</h2>
</div>

</div>

<script>
  // Confetti
  const colors = ['#ff5fa2', '#ffb3d1', '#a685e2', '#7ed6df', '#ffd166', '#ff8ec1'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (4 + Math.random() * 6) + 's';
    c.style.animationDelay = -Math.random() * 6 + 's';
    c.style.width = c.style.height = (6 + Math.random() * 10) + 'px';
    document.body.appendChild(c);
  }

  // Floating hearts and stars
  const floaties = ['❤️', '⭐', '✨', '💖', '🎀', '🎉', '🎂'];
  function spawnFloaty(x, y) {
    const f = document.createElement('div');
    f.className = 'floaty';
    f.textContent = floaties[Math.floor(Math.random() * floaties.length)];
    f.style.left = (x ?? Math.random() * 100 + 'vw');
    if (typeof x === 'number') f.style.left = x + 'px';
    f.style.top = (typeof y === 'number' ? y + 'px' : (60 + Math.random() * 30) + 'vh');
    f.style.animationDuration = (4 + Math.random() * 4) + 's';
    f.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 8000);
  }

  // Auto spawn floaties
  setInterval(spawnFloaty, 600);

  // Click to spawn extras (and prime audio playback)
  document.addEventListener('click', (e) => {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => spawnFloaty(e.clientX + (Math.random() * 80 - 40), e.clientY + (Math.random() * 40 - 20)), i * 50);
    }
    // Try to start music on any click (helps with autoplay restrictions)
    const audio = document.getElementById('bgMusic');
    if (audio && audio.paused && audioWanted) {
      audio.play().then(() => {
        document.getElementById('audioPrompt').classList.remove('show');
      }).catch(() => {});
    }
  });

  // ---------- Slideshow / Montage ----------
  const photos = [
    'IMG_0244.jpg','IMG_0245.jpg','IMG_0922.jpg','IMG_0983.jpg',
    'IMG_1346.jpg','IMG_1421.jpg','IMG_1444.JPG','IMG_1454.jpg',
    'IMG_2280.jpg','IMG_2669.jpg','IMG_2930.jpg','IMG_4268.jpg',
    'IMG_4394.jpg','IMG_4408.jpg','IMG_4432.jpg','IMG_5391.jpg',
    'IMG_5395.jpg','IMG_5436.jpg','IMG_5446.jpg'
  ];

  let audioWanted = false;
  const montage = document.getElementById('montage');
  const audioEl = document.getElementById('bgMusic');
  const audioPrompt = document.getElementById('audioPrompt');
  const caption = document.getElementById('caption');

  // Pre-create slide elements and preload images
  const slides = photos.map((name, i) => {
    const s = document.createElement('div');
    s.className = 'slide';
    s.style.backgroundImage = `url("Photos/${encodeURIComponent(name)}")`;
    montage.appendChild(s);
    // preload
    const img = new Image();
    img.src = `Photos/${encodeURIComponent(name)}`;
    return s;
  });

  const SLIDE_MS = 4500;     // time each slide stays
  const CROSSFADE_MS = 1600; // matches CSS transition
  let slideIdx = 0;

  function showNextSlide() {
    // After the last slide has had its full display time, return to birthday screen
    if (slideIdx >= slides.length) {
      endMontage();
      return;
    }

    const cur = slides[slideIdx];
    const prev = slideIdx === 0 ? null : slides[slideIdx - 1];

    // Pick a Ken Burns variant per slide
    cur.classList.remove('kb1', 'kb2', 'kb3', 'kb4');
    // Force reflow to restart animation
    void cur.offsetWidth;
    const kb = 'kb' + ((slideIdx % 4) + 1);
    cur.classList.add('active', kb);

    if (prev && prev !== cur) {
      prev.classList.remove('active');
      // Clear kb after fadeout
      setTimeout(() => prev.classList.remove('kb1','kb2','kb3','kb4'), CROSSFADE_MS);
    }
    slideIdx++;
    setTimeout(showNextSlide, SLIDE_MS);
  }

  function endMontage() {
    // Fade the last slide out and the montage screen along with it
    const last = slides[slides.length - 1];
    if (last) last.classList.remove('active');
    montage.classList.remove('active');
    // After the fade completes, clear any remaining slide state so nothing flashes if re-shown
    setTimeout(() => {
      slides.forEach(s => s.classList.remove('active', 'kb1', 'kb2', 'kb3', 'kb4'));
    }, CROSSFADE_MS + 100);
    // Music keeps playing in the background on the birthday screen
  }

  function startMontage() {
    audioWanted = true;
    montage.classList.add('active');

    // Show caption briefly at start, fade out after a few seconds
    setTimeout(() => caption.classList.add('show'), 400);
    setTimeout(() => caption.classList.remove('show'), 4500);

    // Try to play audio
    audioEl.play().then(() => {
      audioPrompt.classList.remove('show');
    }).catch(() => {
      // Autoplay blocked — show a click-to-start prompt
      audioPrompt.classList.add('show');
    });

    // Begin slideshow
    showNextSlide();
  }

  // Kick off transition 10 seconds after page load
  setTimeout(startMontage, 10000);
</script>
</body>
</html>
